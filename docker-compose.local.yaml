services:
  backend:
    container_name: backend
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - migration_service
    env_file:
      - .env
    volumes:
      - .:/app          # mount source code for hot reload
      - /app/.venv      # anonymous volume keeps the container-built venv intact
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # restart: on-failure

  db:
    container_name: db
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  migration_service:
    container_name: migration-service
    build:
      context: .
    depends_on:
      - db
    env_file:
      - .env
    # restart: on-failure
    command: ["uv", "run", "alembic", "upgrade", "head"]

volumes:
  pgdata:

networks:
  default:
    name: expense_tracker_network